     style="min-width:90px;text-align:center;{% if active %}background:#1565c0;color:#fff;border-color:#1565c0!important;{% else %}background:#fff;color:#555;{% endif %}">
  <i class="bi bi-{{ icon }}" style="font-size:20px;"></i>
  <span style="font-size:11px;font-weight:700;margin-top:4px;">{{ num }}. {{ label }}</span>
</div>
