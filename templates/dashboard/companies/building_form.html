{% extends "base/dashboard_base.html" %}
{% block content %}
<div style="max-width:860px;">
  <div class="cf-card">
    <div class="cf-card-header d-flex justify-content-between align-items-center"><h5 class="mb-0">{{ page_title }}</h5><a href="{% url 'dashboard:building_list' %}" class="btn btn-cf-outline btn-sm">Back</a></div>
    <div class="cf-card-body">
      <form method="post">{% csrf_token %}
        <div class="row g-3">
          <div class="col-md-6"><label class="form-label">Company *</label><select name="company" class="form-select" required><option value="">— Select company —</option>{% for co in companies %}<option value="{{ co.pk }}" {% if building.company_id == co.pk %}selected{% endif %}>{{ co.name }}</option>{% endfor %}</select></div>
          <div class="col-md-6"><label class="form-label">Building *</label><input type="text" name="name" class="form-control" value="{{ building.name|default:'' }}" required></div>
          <div class="col-md-4"><label class="form-label">State</label><select name="state" class="form-select"><option value="">— Select state —</option>{% for st in states %}<option value="{{ st.pk }}" {% if building.state_id == st.pk %}selected{% endif %}>{{ st.name }}</option>{% endfor %}</select></div>
          <div class="col-md-4"><label class="form-label">City</label><select name="city" class="form-select"><option value="">— Select city —</option>{% for ct in cities %}<option value="{{ ct.pk }}" {% if building.city_id == ct.pk %}selected{% endif %}>{{ ct.name }}{% if ct.state %}, {{ ct.state.name }}{% endif %}</option>{% endfor %}</select></div>
          <div class="col-md-4"><label class="form-label">Location</label><select name="location" class="form-select"><option value="">— Select location —</option>{% for loc in locations %}<option value="{{ loc.pk }}" {% if building.location_id == loc.pk %}selected{% endif %}>{{ loc.name }}</option>{% endfor %}</select></div>
          <div class="col-12 d-flex gap-2"><button class="btn btn-cf-primary">Save</button><a href="{% url 'dashboard:building_list' %}" class="btn btn-cf-outline">Cancel</a></div>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
