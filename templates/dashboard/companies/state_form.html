{% extends "base/dashboard_base.html" %}
{% block content %}
<div style="max-width:520px;">
  <div class="cf-card">
    <div class="cf-card-header"><h5 class="mb-0">{{ page_title }}</h5></div>
    <div class="cf-card-body">
      <form method="post">
        {% csrf_token %}
        {% if messages %}
          {% for msg in messages %}
            <div class="alert alert-{{ msg.tags|default:'info' }} alert-dismissible fade show" role="alert">
              {{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
          {% endfor %}
        {% endif %}
        <div class="mb-3">
          <label class="form-label fw-bold">State Name *</label>
          <input type="text" name="name" value="{{ state.name|default:'' }}" class="form-control" required autofocus placeholder="e.g. Maharashtra">
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-cf-primary">Save</button>
          <a href="{% url 'dashboard:state_list' %}" class="btn btn-cf-outline">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
