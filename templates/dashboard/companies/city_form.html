{% extends "base/dashboard_base.html" %}
{% block content %}
<div style="max-width:720px"><div class="cf-card"><div class="cf-card-header"><h5 class="mb-0">{{ page_title }}</h5></div><div class="cf-card-body"><form method="post">{% csrf_token %}<div class="row g-3"><div class="col-md-6"><label class="form-label">State</label><select name="state" class="form-select"><option value="">— Select state —</option>{% for st in states %}<option value="{{ st.pk }}" {% if city.state_id == st.pk %}selected{% endif %}>{{ st.name }}</option>{% endfor %}</select></div><div class="col-md-6"><label class="form-label">City name *</label><input type="text" name="name" value="{{ city.name|default:'' }}" class="form-control" required></div><div class="col-12"><div class="form-check form-switch"><input class="form-check-input" type="checkbox" name="is_active" id="isActive" {% if city.is_active or not city %}checked{% endif %}><label class="form-check-label" for="isActive">Active</label></div></div><div class="col-12 d-flex gap-2"><button class="btn btn-cf-primary">Save</button><a href="{% url 'dashboard:city_list' %}" class="btn btn-cf-outline">Cancel</a></div></div></form></div></div></div>
{% endblock %}
